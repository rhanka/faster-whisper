name: TypeScript CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - typescript
    tags:
      - v*
  pull_request:
    branches:
      - master
      - typescript

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify npm pack
        run: npm run pack:check

  smoke-test:
    needs: build-test-pack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Verify pristine tarball install
        run: npm run test:pristine-install
